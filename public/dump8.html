<!doctype html><html><body>
<pre id="o">waiting...</pre>
<iframe id="f" src="/" style="width:100%;height:600px;border:1px solid #ccc"></iframe>
<script>
const out = document.getElementById('o');
const log = [];
function add(s) { log.push(s); out.textContent = log.join('\n'); }
const f = document.getElementById('f');
f.addEventListener('load', () => {
  add('Iframe loaded, src=' + f.src);
  setTimeout(() => {
    try {
      const w = f.contentWindow;
      add('Iframe window $RefreshReg$=' + (typeof w.$RefreshReg$));
      add('Iframe root element: ' + (w.document.getElementById('root') ? w.document.getElementById('root').innerHTML.length + ' chars' : 'null'));
    } catch(e) { add('Iframe check err: ' + e.message); }
  }, 5000);
});
</script>
</body></html>
