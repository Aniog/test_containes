<!doctype html><html><body>
<pre id="o">loading iframe...</pre>
<iframe id="f" src="/" style="width:100%;height:600px;border:1px solid #ccc"></iframe>
<script>
const out = document.getElementById('o');
const log = [];
function add(s) { log.push(s); out.textContent = log.join('\n'); }
window.addEventListener('message', e => {
  const d = e.data;
  if (d && (d.__strkRuntimeErrorBridge || d.__strkRouteBridge)) {
    add('BRIDGE: ' + JSON.stringify(d).slice(0, 500));
  }
});
const f = document.getElementById('f');
f.addEventListener('load', () => {
  add('Iframe loaded at ' + new Date().toISOString());
});
</script>
</body></html>
