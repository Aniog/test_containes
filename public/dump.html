<!doctype html><html><body>
<pre id="o">waiting...</pre>
<iframe id="f" src="/" style="width:100%;height:400px;border:1px solid red"></iframe>
<script>
const out = document.getElementById('o');
const log = [];
function add(s) { log.push(s); out.textContent = log.join('\n'); }
add('parent ready');
const f = document.getElementById('f');
window.addEventListener('message', e => {
  const d = e.data || {};
  if (d.__strkRuntimeErrorBridge) {
    add('BRIDGE ' + JSON.stringify(d, null, 2));
  }
});
f.addEventListener('load', () => add('iframe loaded'));
setTimeout(() => {
  try {
    const root = f.contentDocument.getElementById('root');
    add('iframe root children: ' + (root?.childElementCount || 0));
    add('iframe root innerHTML: ' + (root?.innerHTML?.slice(0, 300) || 'none'));
  } catch(e) { add('cannot read iframe: ' + e.message); }
}, 3000);
</script>
</body></html>
