<!doctype html>
<html><head><meta charset="utf-8"><title>check</title></head>
<body>
<div id="out">Loading...</div>
<script type="module">
const out = document.getElementById('out')
const errs = []
window.addEventListener('error', e => errs.push('ERR: ' + e.message + ' @ ' + e.filename + ':' + e.lineno))
window.addEventListener('unhandledrejection', e => errs.push('REJ: ' + (e.reason?.message || String(e.reason))))
try {
  // try to dynamically import the main module
  await import('/src/main.jsx')
} catch (e) {
  errs.push('IMPORT: ' + (e?.message || String(e)))
}
await new Promise(r => setTimeout(r, 1500))
out.textContent = JSON.stringify(errs, null, 2) + '\n\nroot inner:\n' + (document.getElementById('root')?.innerHTML?.slice(0, 2000) || 'no root')
</script>
</body></html>
