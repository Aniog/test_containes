<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>
      China Sourcing Agent | Supplier Verification, QC &amp; Shipping | SSourcing
      China
    </title>
    <meta
      name="description"
      content="SSourcing China is a B2B sourcing agent based in China. We help global buyers find reliable suppliers, verify factories, run quality inspections, follow production, and coordinate shipping from China to your destination port."
    />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="China Sourcing Agent for Global Buyers | SSourcing China" />
    <meta property="og:description" content="Find, verify, and manage Chinese suppliers. QC, production follow-up, and shipping coordination handled end to end." />
    <meta property="og:type" content="website" />
    <script>
      (() => {
        if (window.__STRK_PREVIEW_ROUTE_BRIDGE__) return;
        window.__STRK_PREVIEW_ROUTE_BRIDGE__ = true;
        const CHANNEL = "strikingly-preview";
        const VERSION = 1;
        const getRoutePayload = (source) => ({
          url: window.location.href,
          origin: window.location.origin,
          path: window.location.pathname + window.location.search + window.location.hash,
          pathname: window.location.pathname,
          search: window.location.search,
          hash: window.location.hash,
          title: document.title,
          source,
          timestamp: Date.now(),
        });
        const postRoute = (type, source) => {
          if (!window.parent || window.parent === window) return;
          try {
            window.parent.postMessage(
              { channel: CHANNEL, version: VERSION, type, payload: getRoutePayload(source) },
              "*"
            );
          } catch {}
        };
        postRoute("route:hello", "boot");
        window.addEventListener("popstate", () => postRoute("route:change", "popstate"));
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
