  <body>
    <div id="root"></div>
    <script>
      (() => {
        if (window.__STRK_PREVIEW_ROUTE_BRIDGE__) {
          return;
        }

        window.__STRK_PREVIEW_ROUTE_BRIDGE__ = true;

        const CHANNEL = "strikingly-preview";
        const VERSION = 1;

        const getRoutePayload = (source) => ({
          url: window.location.href,
          origin: window.location.origin,
          path: `${window.location.pathname}${window.location.search}${window.location.hash}`,
          pathname: window.location.pathname,
          search: window.location.search,
          hash: window.location.hash,
          title: document.title,
          source,
          timestamp: Date.now(),
        });

        const postRoute = (type, source) => {
          if (!window.parent || window.parent === window) {
            return;
          }

          try {
            window.parent.postMessage(
              {
                channel: CHANNEL,
                version: VERSION,
                type,
                payload: getRoutePayload(source),
              },
              "*",
            );
          } catch {
            // Keep the generated app running even if preview communication fails.
          }
        };

        postRoute("route:bootstrap", "bootstrap");

        const wrap = (name) => {
          if (!window.history[name]) {
            return;
          }
          const original = window.history[name].bind(window.history);
          window.history[name] = (...args) => {
            const result = original(...args);
            window.requestAnimationFrame(() => {
              postRoute(`route:${name}`, name);
            });
            return result;
          };
        };

        wrap("pushState");
        wrap("replaceState");

        window.addEventListener("popstate", () => {
          postRoute("route:popstate", "popstate");
        });
        window.addEventListener("hashchange", () => {
          postRoute("route:hashchange", "hashchange");
        });
      })();
    </script>
    <script>
      (() => {
        if (window.__STRK_PREVIEW_ERROR_BRIDGE__) {
          return;
        }

        window.__STRK_PREVIEW_ERROR_BRIDGE__ = true;

        const CHANNEL = "strikingly-preview";
        const VERSION = 1;
        const MAX_STACK_LENGTH = 6000;
        const MAX_RECENT_LOGS = 25;
        const MAX_RECENT_ARG_LENGTH = 240;
        const MAX_REASON_LENGTH = 1200;
        const recentLogs = [];

        const rememberConsoleError = (args) => {
          try {
            const text = args
              .map((entry) => {
                if (entry instanceof Error) {
                  return entry.stack || entry.message;
                }
                if (typeof entry === "string") {
                  return entry;
                }
                try {
                  return JSON.stringify(entry);
                } catch {
                  return String(entry);
                }
              })
              .join(" ")
              .slice(0, MAX_RECENT_ARG_LENGTH);
            recentLogs.push({
              kind: "console-error",
              text,
              timestamp: Date.now(),
            });
            if (recentLogs.length > MAX_RECENT_LOGS) {
              recentLogs.shift();
            }
          } catch {
            // Ignore errors while capturing logs.
          }
        };

        const postToParent = (payload) => {
          if (!window.parent || window.parent === window) {
            return;
          }

          try {
            window.parent.postMessage(
              {
                channel: CHANNEL,
                version: VERSION,
                ...payload,
              },
              "*",
            );
          } catch {
            // Bridge failures should never break the app.
          }
        };

        const getRecentDiagnostics = () => recentLogs.slice(-5);

        const stringifyValue = (value) => {
          if (value === undefined) return "undefined";
          if (value === null) return "null";
          if (typeof value === "string") return value;
          if (value instanceof Error) return value.stack || value.message;
          try {
            return JSON.stringify(value);
          } catch {
            return String(value);
          }
        };

        const normalizeStack = (stack) => {
          if (!stack) return "";
          return stack.length > MAX_STACK_LENGTH
            ? `${stack.slice(0, MAX_STACK_LENGTH)}…`
            : stack;
        };

        const normalizeError = (error) => {
          if (!error) {
            return {
              name: "Error",
              message: "Unknown error",
              stack: "",
              source: "",
              lineno: 0,
              colno: 0,
            };
          }

          if (error instanceof Error) {
            return {
              name: error.name || "Error",
              message: error.message || "",
              stack: normalizeStack(error.stack || ""),
              source: "",
              lineno: 0,
              colno: 0,
            };
          }

          return {
            name: "Error",
            message: typeof error === "string" ? error : stringifyValue(error),
            stack: "",
            source: "",
            lineno: 0,
            colno: 0,
          };
        };

        const FIRST_PARTY_PATTERN = /localhost|127\.0\.0\.1|0\.0\.0\.0|modal\.host|strikingly\.com|::1/;
        const IGNORED_MESSAGE_PATTERN = /ResizeObserver|sourcemap|Failed to load resource|downloadable font|fonts\.gstatic\.com|fonts\.googleapis\.com|net::ERR_ABORTED/i;
        const IGNORED_PROMISE_PATTERN = /Loading chunk|Loading CSS chunk|Failed to fetch dynamically imported module|dynamic import/i;

        const hasFirstPartyEvidence = (normalized) => {
          const stack = normalized.stack || "";
          const source = normalized.source || "";
          if (FIRST_PARTY_PATTERN.test(stack)) return true;
          if (FIRST_PARTY_PATTERN.test(source)) return true;
          return false;
        };

        window.addEventListener("error", (event) => {
          const normalized = {
            name: event.error?.name || "Error",
            message: event.message || event.error?.message || "Unknown error",
            stack: event.error?.stack || "",
            source: event.filename || "",
            lineno: event.lineno || 0,
            colno: event.colno || 0,
          };

          if (IGNORED_MESSAGE_PATTERN.test(normalized.message)) {
            return;
          }

          if (!hasFirstPartyEvidence(normalized)) {
            return;
          }

          postToParent({
            type: "unhandled-error",
            kind: "window-error",
            name: normalized.name,
            message: normalized.message,
            stack: normalized.stack,
            source: normalized.source,
            lineno: normalized.lineno,
            colno: normalized.colno,
            args: getRecentDiagnostics(),
          });
        });

        window.addEventListener("unhandledrejection", (event) => {
          const normalized = normalizeError(event.reason);
          const combinedMessage = `${normalized.name}: ${normalized.message}`;

          if (
            IGNORED_PROMISE_PATTERN.test(combinedMessage) ||
            !hasFirstPartyEvidence(normalized)
          ) {
            return;
          }
          postToParent({
            type: "unhandled-rejection",
            kind: "promise-rejection",
            name: normalized.name,
            message: normalized.message || "Unhandled promise rejection",
            stack: normalized.stack,
            source: normalized.source,
            lineno: normalized.lineno,
            colno: normalized.colno,
            reason: stringifyValue(event.reason).slice(0, MAX_REASON_LENGTH),
            args: getRecentDiagnostics(),
          });
        });

        const originalConsoleError = console.error.bind(console);
        console.error = (...args) => {
          rememberConsoleError(args);
          originalConsoleError(...args);
        };
      })();
    </script>
