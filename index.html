    <script>
      (() => {
        if (window.__STRK_PREVIEW_ROUTE_BRIDGE__) {
          return;
        }

        window.__STRK_PREVIEW_ROUTE_BRIDGE__ = true;

        const CHANNEL = "strikingly-preview";
        const VERSION = 1;

        const getRoutePayload = (source) => ({
          url: window.location.href,
          origin: window.location.origin,
          path: `${window.location.pathname}${window.location.search}${window.location.hash}`,
          pathname: window.location.pathname,
          search: window.location.search,
          hash: window.location.hash,
          title: document.title,
          source,
          timestamp: Date.now(),
        });

        const postRoute = (type, source) => {
          if (!window.parent || window.parent === window) {
            return;
          }

          try {
            window.parent.postMessage(
              {
                channel: CHANNEL,
                version: VERSION,
                type,
                payload: getRoutePayload(source),
              },
              "*",
            );
          } catch {
            // Keep the generated app running even if preview communication fails.
          }
        };

        const notifyRouteChanged = (source) => {
          window.requestAnimationFrame(() =>
            postRoute("route:changed", source),
          );
        };

        const patchHistoryMethod = (methodName) => {
          const originalMethod = window.history[methodName];
          if (typeof originalMethod !== "function") {
            return;
          }

          window.history[methodName] = function patchedHistoryMethod(...args) {
            const result = originalMethod.apply(this, args);
            notifyRouteChanged(methodName);
            return result;
          };
        };

        patchHistoryMethod("pushState");
        patchHistoryMethod("replaceState");

        window.addEventListener("popstate", () => {
          notifyRouteChanged("popstate");
        });

        window.addEventListener("hashchange", () => {
          notifyRouteChanged("hashchange");
        });

        window.addEventListener("load", () => {
          postRoute("route:ready", "load");
          postRoute("route:changed", "load");
        });

        window.addEventListener("message", (event) => {
          const data = event.data;
          if (
            !data ||
            typeof data !== "object" ||
            data.channel !== CHANNEL ||
            data.version !== VERSION
          ) {
            return;
          }

          if (data.type === "route:request") {
            postRoute("route:changed", "load");
            return;
          }

          if (data.type !== "route:navigate") {
            return;
          }

          const path = data.payload?.path;
          if (typeof path !== "string" || !path) {
            return;
          }

          const replace = Boolean(data.payload?.replace);
          const navigate = window.__STRIKINGLY_PREVIEW_NAVIGATE__;

          if (typeof navigate === "function") {
            navigate(path, { replace });
            notifyRouteChanged("navigate-command");
            return;
          }

          if (replace) {
            window.history.replaceState({}, "", path);
          } else {
            window.history.pushState({}, "", path);
          }

          window.dispatchEvent(new PopStateEvent("popstate", { state: {} }));
          notifyRouteChanged("navigate-command");
        });
      })();
    </script>
    <script>
      (() => {
        if (window.__STRK_RUNTIME_ERROR_BRIDGE__) {
          return;
        }

        window.__STRK_RUNTIME_ERROR_BRIDGE__ = true;

        const BRIDGE_FLAG = "__strkRuntimeErrorBridge";
        const MAX_STRING_LENGTH = 2000;

        const truncate = (value) =>
          value.length > MAX_STRING_LENGTH
            ? `${value.slice(0, MAX_STRING_LENGTH)}...`
            : value;

        const stringifyValue = (value) => {
          if (value instanceof Error) {
            return truncate(value.stack || `${value.name}: ${value.message}`);
          }

          if (typeof value === "string") {
            return truncate(value);
          }

          if (
            typeof value === "number" ||
            typeof value === "boolean" ||
            value == null
          ) {
            return String(value);
          }

          if (typeof value === "function") {
            return `[Function ${value.name || "anonymous"}]`;
          }

          const seen = new WeakSet();

          try {
            return truncate(
              JSON.stringify(value, (_, innerValue) => {
                if (innerValue instanceof Error) {
                  return {
                    name: innerValue.name,
                    message: innerValue.message,
                    stack: innerValue.stack,
                  };
                }

                if (typeof innerValue === "object" && innerValue !== null) {
                  if (seen.has(innerValue)) {
                    return "[Circular]";
                  }
                  seen.add(innerValue);
                }

                if (typeof innerValue === "function") {
                  return `[Function ${innerValue.name || "anonymous"}]`;
                }

                return innerValue;
              }),
            );
          } catch {
            return Object.prototype.toString.call(value);
          }
        };

        const normalizeErrorLike = (value) => {
          if (value instanceof Error) {
            return {
              name: value.name || "Error",
              message: value.message || "Unknown runtime error",
              stack: value.stack || "",
              source: value.fileName || value.filename || "",
              lineno: value.lineNumber || value.lineno || null,
              colno: value.columnNumber || value.colno || null,
            };
          }

          if (typeof value === "string") {
            return {
              name: "",
              message: value,
              stack: "",
              source: "",
              lineno: null,
              colno: null,
            };
          }

          if (value && typeof value === "object") {
            return {
              name: typeof value.name === "string" ? value.name : "",
              message:
                typeof value.message === "string"
                  ? value.message
                  : stringifyValue(value),
              stack: typeof value.stack === "string" ? value.stack : "",
              source:
                typeof value.fileName === "string"
                  ? value.fileName
                  : typeof value.filename === "string"
                    ? value.filename
                    : "",
              lineno:
                typeof value.lineNumber === "number"
                  ? value.lineNumber
                  : typeof value.lineno === "number"
                    ? value.lineno
                    : null,
              colno:
                typeof value.columnNumber === "number"
                  ? value.columnNumber
                  : typeof value.colno === "number"
                    ? value.colno
                    : null,
            };
          }

          return {
            name: "",
            message: stringifyValue(value) || "Unknown runtime error",
            stack: "",
            source: "",
            lineno: null,
            colno: null,
          };
        };

        const extractComponentStack = (args) => {
          for (const arg of args) {
            if (
              arg &&
              typeof arg === "object" &&
              typeof arg.componentStack === "string"
            ) {
              return truncate(arg.componentStack);
            }

            if (
              typeof arg === "string" &&
              (arg.includes("\n    at ") ||
                arg.includes("\n at ") ||
                arg.includes("The above error occurred"))
            ) {
              return truncate(arg);
            }
          }

          return "";
        };

        const postToParent = (payload) => {
          if (!window.parent || window.parent === window) {
            return;
          }
          try {
            window.parent.postMessage(
              {
                [BRIDGE_FLAG]: true,
                href: window.location.href,
                timestamp: Date.now(),
                ...payload,
              },
              "*",
            );
          } catch {
            // Ignore bridge failures to avoid hiding the original runtime error.
          }
        };

        window.addEventListener(
          "error",
          (event) => {
            const target = event.target;
            const isResourceError =
              target && target !== window && target !== document;

            if (isResourceError) {
              const tagName = target.tagName || "resource";
              const resourceUrl =
                target.currentSrc || target.src || target.href || "";

              postToParent({
                type: "runtime-error",
                kind: "resource-error",
                message: `Failed to load ${tagName.toLowerCase()} resource.`,
                source: resourceUrl,
                resourceTagName: tagName.toLowerCase(),
                resourceUrl,
              });
              return;
            }

            const normalized = normalizeErrorLike(event.error || event.message);
            postToParent({
              type: "runtime-error",
              kind: "error",
              name: normalized.name,
              message: normalized.message || event.message,
              stack: normalized.stack,
              source: event.filename || normalized.source,
              lineno: event.lineno || normalized.lineno,
              colno: event.colno || normalized.colno,
            });
          },
          true,
        );

        window.addEventListener("unhandledrejection", (event) => {
          const normalized = normalizeErrorLike(event.reason);
          postToParent({
            type: "unhandled-rejection",
            kind: "promise-rejection",
            name: normalized.name,
            message: normalized.message || "Unhandled promise rejection",
            stack: normalized.stack,
            source: normalized.source,
            lineno: normalized.lineno,
            colno: normalized.colno,
            reason: stringifyValue(event.reason),
          });
        });

        const originalConsoleError = console.error.bind(console);
        console.error = (...args) => {
          const errorLike = args.find(
            (arg) =>
              arg instanceof Error ||
              (arg &&
                typeof arg === "object" &&
                ("message" in arg || "stack" in arg)),
          );
          const normalized = normalizeErrorLike(errorLike || args[0]);

          postToParent({
            type: "console-error",
            kind: "console-error",
            name: normalized.name,
            message:
              normalized.message ||
              args.map((arg) => stringifyValue(arg)).join(" "),
            stack: normalized.stack,
            componentStack: extractComponentStack(args),
            args: args.map((arg) => stringifyValue(arg)),
          });

          originalConsoleError(...args);
        };
      })();
    </script>
    <script>
      // Mark <html> as having JS so .js-only hooks become visible.
      // Search filter, "Show all" toggles, and FAQ are progressively enhanced
      // by this script. With JS disabled, every card stays visible and the
      // search input is inert — the page is still fully usable.
      (function () {
        var d = document.documentElement;
        d.className = (d.className || "").replace(/\bno-js\b/g, "") + " has-js";

        var COLLAPSED = 6;

        function ready(fn) {
          if (document.readyState !== "loading") fn();
          else document.addEventListener("DOMContentLoaded", fn);
        }

        ready(function () {
          initShowAll();
          initSearch();
        });

        function initShowAll() {
          var buttons = document.querySelectorAll("[data-show-all]");
          buttons.forEach(function (btn) {
            var gridId = btn.getAttribute("data-controls");
            var grid = document.getElementById(gridId);
            if (!grid) return;
            var cards = grid.querySelectorAll("[data-card]");
            var total = cards.length;
            if (total <= COLLAPSED) {
              btn.parentNode && btn.parentNode.removeChild(btn);
              return;
            }
            // Show the toggle, then collapse extras.
            btn.classList.remove("hidden");
            btn.style.display = "inline-flex";
            btn.setAttribute("aria-expanded", "false");
            collapse(grid, cards, true);

            btn.addEventListener("click", function () {
              var expanded = btn.getAttribute("aria-expanded") === "true";
              if (expanded) {
                collapse(grid, cards, true);
                btn.setAttribute("aria-expanded", "false");
                btn.querySelector("[data-show-all-label]").textContent =
                  "Show all " + total + " generators";
              } else {
                expand(cards);
                btn.setAttribute("aria-expanded", "true");
                btn.querySelector("[data-show-all-label]").textContent =
                  "Show fewer";
              }
            });
          });
        }

        function collapse(grid, cards, isInitial) {
          cards.forEach(function (card, i) {
            if (i < COLLAPSED) {
              card.style.display = "";
            } else {
              card.style.display = "none";
            }
          });
        }
        function expand(cards) {
          cards.forEach(function (card) {
            card.style.display = "";
          });
        }

        function initSearch() {
          var input = document.querySelector("[data-search-input]");
          if (!input) return;
          var countEl = document.querySelector("[data-search-count]");
          var emptyEl = document.querySelector("[data-empty-state]");
          var clearBtn = document.querySelector("[data-clear-search]");
          var allCards = document.querySelectorAll("[data-card]");
          var subsections = document.querySelectorAll("[data-subsection]");
          var total = allCards.length;

          function format(n) {
            return n + " generator" + (n === 1 ? "" : "s") + " match";
          }

          function applySearch() {
            var raw = input.value || "";
            var q = raw.trim().toLowerCase();
            var visibleCount = 0;
            var visibleSubsections = 0;

            subsections.forEach(function (sub) {
              var cardsInSub = sub.querySelectorAll("[data-card]");
              var subVisible = 0;
              cardsInSub.forEach(function (card) {
                var hay = card.getAttribute("data-search") || "";
                var match = !q || hay.indexOf(q) !== -1;
                // For a clear visual, hide non-matching cards in sub mode,
                // and force-show hidden-by-collapse cards during a search.
                if (!q) {
                  // Reset to collapsed state if we had a "Show all" toggle.
                  card.style.display = "";
                } else if (match) {
                  card.style.display = "";
                  subVisible++;
                } else {
                  card.style.display = "none";
                }
              });
              if (q) visibleCount += subVisible;
              if (!q || subVisible > 0) {
                sub.style.display = "";
                if (q) visibleSubsections++;
              } else {
                sub.style.display = "none";
              }
            });

            // While searching, force-expand every grid (ignore the 6-card
            // collapse). After clearing, re-collapse using the buttons.
            if (q) {
              // Re-expand all cards (filtering already happened above).
              document
                .querySelectorAll("[data-show-all]")
                .forEach(function (btn) {
                  btn.style.display = "none";
                });
            } else {
              document
                .querySelectorAll("[data-show-all]")
                .forEach(function (btn) {
                  btn.style.display = "inline-flex";
                });
              // Re-collapse to first 6 per subsection.
              subsections.forEach(function (sub) {
                var cardsInSub = sub.querySelectorAll("[data-card]");
                cardsInSub.forEach(function (card, i) {
                  card.style.display = i < COLLAPSED ? "" : "none";
                });
                var btn = sub.querySelector("[data-show-all]");
                if (btn) {
                  var gridId = btn.getAttribute("data-controls");
                  var grid = document.getElementById(gridId);
                  if (grid) {
                    var totalInSub = grid.querySelectorAll("[data-card]").length;
                    if (totalInSub <= COLLAPSED) {
                      btn.style.display = "none";
                    } else {
                      btn.setAttribute("aria-expanded", "false");
                      btn.querySelector("[data-show-all-label]").textContent =
                        "Show all " + totalInSub + " generators";
                    }
                  }
                }
              });
            }

            if (!q) {
              if (countEl) countEl.textContent = format(total);
            } else {
              if (countEl) countEl.textContent = format(visibleCount);
            }
            if (emptyEl) {
              if (q && visibleCount === 0) {
                emptyEl.removeAttribute("hidden");
              } else {
                emptyEl.setAttribute("hidden", "");
              }
            }
          }

          input.addEventListener("input", applySearch);
          if (clearBtn) {
            clearBtn.addEventListener("click", function () {
              input.value = "";
              applySearch();
              input.focus();
            });
          }
        }
      })();
    </script>
