<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <title>Velmora Fine Jewelry</title>
    <style>
      .bg-charcoal { background-color: #1A1A1A !important; }
      .text-charcoal { color: #1A1A1A; }
      .border-charcoal { border-color: #1A1A1A; }
      .bg-cream { background-color: #FAF7F2; }
      .text-cream { color: #FAF7F2; }
      .bg-ink { background-color: #2C2420; }
      .text-ink { color: #2C2420; }
      .bg-gold { background-color: #B8860B; }
      .text-gold { color: #B8860B; }
      .border-gold { border-color: #B8860B; }
      .bg-gold-dark { background-color: #96690A; }
      .text-gold-dark { color: #96690A; }
      .bg-gold-light { background-color: #D4A843; }
      .text-gold-light { color: #D4A843; }
      .bg-sand { background-color: #E8E0D6; }
      .text-sand { color: #E8E0D6; }
      .border-sand { border-color: #E8E0D6; }
      .bg-linen { background-color: #F5F0EA; }
      .text-linen { color: #F5F0EA; }
      .text-stone { color: #7A6F66; }
      .border-stone { border-color: #7A6F66; }
      .tracking-product { letter-spacing: 0.15em; }
      .tracking-button { letter-spacing: 0.1em; }
      .hover\:bg-charcoal:hover { background-color: #1A1A1A; }
      .hover\:text-charcoal:hover { color: #1A1A1A; }
      .hover\:bg-ink:hover { background-color: #2C2420; }
      .hover\:text-ink:hover { color: #2C2420; }
      .hover\:bg-gold:hover { background-color: #B8860B; }
      .hover\:text-gold:hover { color: #B8860B; }
      .hover\:bg-gold-dark:hover { background-color: #96690A; }
      .hover\:text-gold-dark:hover { color: #96690A; }
      .hover\:bg-cream:hover { background-color: #FAF7F2; }
      .hover\:text-cream:hover { color: #FAF7F2; }
      .hover\:bg-linen:hover { background-color: #F5F0EA; }
      .hover\:border-gold:hover { border-color: #B8860B; }
      .focus\:border-gold:focus { border-color: #B8860B; }
      .bg-cream\/95 { background-color: rgba(250, 247, 242, 0.95); }
      .bg-charcoal\/10 { background-color: rgba(26, 26, 26, 0.1); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        if (window.__STRK_PREVIEW_ROUTE_BRIDGE__) {
          return;
        }

        window.__STRK_PREVIEW_ROUTE_BRIDGE__ = true;

        const CHANNEL = "strikingly-preview";
        const VERSION = 1;

        const getRoutePayload = (source) => ({
          url: window.location.href,
          origin: window.location.origin,
          path: `${window.location.pathname}${window.location.search}${window.location.hash}`,
          pathname: window.location.pathname,
          search: window.location.search,
          hash: window.location.hash,
          title: document.title,
          source,
          timestamp: Date.now(),
        });

        const postRoute = (type, source) => {
          if (!window.parent || window.parent === window) {
            return;
          }

          try {
            window.parent.postMessage(
              {
                channel: CHANNEL,
                version: VERSION,
                type,
                payload: getRoutePayload(source),
              },
              "*",
            );
          } catch {
            // Keep the generated app running even if preview communication fails.
          }
        };

        const notifyRouteChanged = (source) => {
          window.requestAnimationFrame(() =>
            postRoute("route:changed", source),
          );
        };

        const patchHistoryMethod = (methodName) => {
          const originalMethod = window.history[methodName];
          if (typeof originalMethod !== "function") {
            return;
          }

          window.history[methodName] = function patchedHistoryMethod(...args) {
            const result = originalMethod.apply(this, args);
            notifyRouteChanged(methodName);
            return result;
          };
        };

        patchHistoryMethod("pushState");
        patchHistoryMethod("replaceState");

        window.addEventListener("popstate", () => {
          notifyRouteChanged("popstate");
        });

        window.addEventListener("hashchange", () => {
          notifyRouteChanged("hashchange");
        });

        window.addEventListener("load", () => {
          postRoute("route:ready", "load");
          postRoute("route:changed", "load");
        });

        window.addEventListener("message", (event) => {
          const data = event.data;
          if (
            !data ||
            typeof data !== "object" ||
            data.channel !== CHANNEL ||
            data.version !== VERSION
          ) {
            return;
          }

          if (data.type === "route:request") {
            postRoute("route:changed", "load");
            return;
          }

          if (data.type !== "route:navigate") {
            return;
          }

          const path = data.payload?.path;
          if (typeof path !== "string" || !path) {
            return;
          }

          const replace = Boolean(data.payload?.replace);
          const navigate = window.__STRIKINGLY_PREVIEW_NAVIGATE__;

          if (typeof navigate === "function") {
            navigate(path, { replace });
            notifyRouteChanged("navigate-command");
            return;
          }

          if (replace) {
            window.history.replaceState({}, "", path);
          } else {
            window.history.pushState({}, "", path);
          }

          window.dispatchEvent(new PopStateEvent("popstate", { state: {} }));
          notifyRouteChanged("navigate-command");
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
