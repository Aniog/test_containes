  <body>
    <div id="root"></div>
    <script>
      (() => {
        if (window.__STRK_PREVIEW_ROUTE_BRIDGE__) {
          return;
        }

        window.__STRK_PREVIEW_ROUTE_BRIDGE__ = true;

        const CHANNEL = "strikingly-preview";
        const VERSION = 1;

        const getRoutePayload = (source) => ({
          url: window.location.href,
          origin: window.location.origin,
          path: `${window.location.pathname}${window.location.search}${window.location.hash}`,
          pathname: window.location.pathname,
          search: window.location.search,
          hash: window.location.hash,
          title: document.title,
          source,
          timestamp: Date.now(),
        });

        const postRoute = (type, source) => {
          if (!window.parent || window.parent === window) {
            return;
          }

          try {
            window.parent.postMessage(
              {
                channel: CHANNEL,
                version: VERSION,
                type,
                payload: getRoutePayload(source),
              },
              "*",
            );
          } catch {
            // Keep the generated app running even if preview communication fails.
          }
        };

        const notifyRouteChanged = (source) => {
          window.requestAnimationFrame(() =>
            postRoute("route:changed", source),
          );
        };

        const patchHistoryMethod = (methodName) => {
          const originalMethod = window.history[methodName];
          if (typeof originalMethod !== "function") {
            return;
          }

          window.history[methodName] = function patchedHistoryMethod(...args) {
            const result = originalMethod.apply(this, args);
            notifyRouteChanged(methodName);
            return result;
          };
        };

        patchHistoryMethod("pushState");
        patchHistoryMethod("replaceState");

        window.addEventListener("popstate", () => {
          notifyRouteChanged("popstate");
        });

        window.addEventListener("hashchange", () => {
          notifyRouteChanged("hashchange");
        });

        window.addEventListener("load", () => {
          postRoute("route:ready", "load");
          postRoute("route:changed", "load");
        });

        window.addEventListener("message", (event) => {
          const data = event.data;
          if (
            !data ||
            typeof data !== "object" ||
            data.channel !== CHANNEL ||
            data.version !== VERSION
          ) {
            return;
          }

          if (data.type === "route:request") {
            postRoute("route:changed", "load");
            return;
          }

          if (data.type !== "route:navigate") {
            return;
          }

          const path = data.payload?.path;
          if (typeof path !== "string" || !path) {
            return;
          }

          const replace = Boolean(data.payload?.replace);
          const navigate = window.__STRIKINGLY_PREVIEW_NAVIGATE__;

          if (typeof navigate === "function") {
            navigate(path, { replace });
            notifyRouteChanged("navigate-command");
            return;
          }

          if (replace) {
            window.history.replaceState({}, "", path);
          } else {
            window.history.pushState({}, "", path);
          }

          window.dispatchEvent(new PopStateEvent("popstate", { state: {} }));
          notifyRouteChanged("navigate-command");
        });
      })();
    </script>
