<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>VELMORA — Fine Jewelry</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        if (window.__STRK_PREVIEW_ROUTE_BRIDGE__) {
          return;
        }

        window.__STRK_PREVIEW_ROUTE_BRIDGE__ = true;

        const CHANNEL = "strikingly-preview";
        const VERSION = 1;

        const getRoutePayload = (source) => ({
          url: window.location.href,
          origin: window.location.origin,
          path: `${window.location.pathname}${window.location.search}${window.location.hash}`,
          pathname: window.location.pathname,
          search: window.location.search,
          hash: window.location.hash,
          title: document.title,
          source,
          timestamp: Date.now(),
        });

        const postRoute = (type, source) => {
          if (!window.parent || window.parent === window) {
            return;
          }

          try {
            window.parent.postMessage(
              {
                channel: CHANNEL,
                version: VERSION,
                type,
                payload: getRoutePayload(source),
              },
              "*",
            );
          } catch {
            // Keep the generated app running even if preview communication fails.
          }
        };

        const notifyRouteChanged = (source) => {
          window.requestAnimationFrame(() =>
            postRoute("route:changed", source),
          );
        };

        const patchHistoryMethod = (methodName) => {
          const originalMethod = window.history[methodName];
          if (typeof originalMethod !== "function") {
            return;
          }

          window.history[methodName] = function patchedHistoryMethod(...args) {
            const result = originalMethod.apply(this, args);
            notifyRouteChanged(methodName);
            return result;
          };
        };

        patchHistoryMethod("pushState");
        patchHistoryMethod("replaceState");

        window.addEventListener("popstate", () => {
          notifyRouteChanged("popstate");
        });

        window.addEventListener("hashchange", () => {
          notifyRouteChanged("hashchange");
        });

        window.addEventListener("load", () => {
          postRoute("route:ready", "load");
          postRoute("route:changed", "load");
        });

        window.addEventListener("message", (event) => {
          const data = event.data;
          if (
            !data ||
            typeof data !== "object" ||
            data.channel !== CHANNEL ||
            data.version !== VERSION
          ) {
            return;
          }

          if (data.type === "route:request") {
            postRoute("route:changed", "load");
            return;
          }

          if (data.type !== "route:navigate") {
            return;
          }

          const path = data.payload?.path;
          if (typeof path !== "string" || !path) {
            return;
          }

          const replace = Boolean(data.payload?.replace);
          const navigate = window.__STRIKINGLY_PREVIEW_NAVIGATE__;

          if (typeof navigate === "function") {
            navigate(path, { replace });
            notifyRouteChanged("navigate-command");
            return;
          }

          if (replace) {
            window.history.replaceState({}, "", path);
          } else {
            window.history.pushState({}, "", path);
          }

          window.dispatchEvent(new PopStateEvent("popstate", { state: {} }));
          notifyRouteChanged("navigate-command");
        });
      })();
    </script>
    <script>
      (() => {
        if (window.__STRK_RUNTIME_ERROR_BRIDGE__) {
          return;
        }

        window.__STRK_RUNTIME_ERROR_BRIDGE__ = true;

        const BRIDGE_FLAG = "__strkRuntimeErrorBridge";
        const HEALTH_CHECK_COMMAND = "runtime-error:check-health";
        const MAX_STRING_LENGTH = 2000;
        const MAX_RECENT_CONSOLE_ERRORS = 5;
        const FIRST_PARTY_PATH_PATTERN = /(?:^|[\\/])(?:src|app)(?:[\\/]|$)/i;
        const IGNORED_PROMISE_PATTERN =
          /\b(?:aborterror|aborted|cancel(?:led|ed)?|failed to fetch|load failed|networkerror|network request failed|resizeobserver loop)\b/i;
        const recentConsoleErrors = [];

        const truncate = (value) =>
          value.length > MAX_STRING_LENGTH
            ? `${value.slice(0, MAX_STRING_LENGTH)}...`
            : value;

        const stringifyValue = (value) => {
          if (value instanceof Error) {
            return truncate(value.stack || `${value.name}: ${value.message}`);
          }

          if (typeof value === "string") {
            return truncate(value);
          }

          if (
            typeof value === "number" ||
            typeof value === "boolean" ||
            value == null
          ) {
            return String(value);
          }

          if (typeof value === "function") {
            return `[Function ${value.name || "anonymous"}]`;
          }

          const seen = new WeakSet();

          try {
            return truncate(
              JSON.stringify(value, (_, innerValue) => {
                if (innerValue instanceof Error) {
                  return {
                    name: innerValue.name,
                    message: innerValue.message,
                    stack: innerValue.stack,
                  };
                }

                if (typeof innerValue === "object" && innerValue !== null) {
                  if (seen.has(innerValue)) {
                    return "[Circular]";
                  }
                  seen.add(innerValue);
                }

                if (typeof innerValue === "function") {
                  return `[Function ${innerValue.name || "anonymous"}]`;
                }

                return innerValue;
              }),
            );
          } catch {
            return Object.prototype.toString.call(value);
          }
        };

        const normalizeErrorLike = (value) => {
          if (value instanceof Error) {
            return {
              name: value.name || "Error",
              message: value.message || "Unknown runtime error",
              stack: value.stack || "",
              source: value.fileName || value.filename || "",
              lineno: value.lineNumber || value.lineno || null,
              colno: value.columnNumber || value.colno || null,
            };
          }

          if (typeof value === "string") {
            return {
              name: "",
              message: value,
              stack: "",
              source: "",
              lineno: null,
              colno: null,
            };
          }

          if (value && typeof value === "object") {
            return {
              name: typeof value.name === "string" ? value.name : "",
              message:
                typeof value.message === "string"
                  ? value.message
                  : stringifyValue(value),
              stack: typeof value.stack === "string" ? value.stack : "",
              source:
                typeof value.fileName === "string"
                  ? value.fileName
                  : typeof value.filename === "string"
                    ? value.filename
                    : "",
              lineno:
                typeof value.lineNumber === "number"
                  ? value.lineNumber
                  : typeof value.lineno === "number"
                    ? value.lineno
                    : null,
              colno:
                typeof value.columnNumber === "number"
                  ? value.columnNumber
                  : typeof value.colno === "number"
                    ? value.colno
                    : null,
            };
          }

          return {
            name: "",
            message: stringifyValue(value) || "Unknown runtime error",
            stack: "",
            source: "",
            lineno: null,
            colno: null,
          };
        };

        const isFirstPartySource = (value) => {
          if (!value) {
            return false;
          }

          if (
            !/^[a-z][a-z\d+.-]*:/i.test(value) &&
            FIRST_PARTY_PATH_PATTERN.test(value)
          ) {
            return true;
          }

          try {
            const sourceUrl = new URL(value, window.location.href);
            if (sourceUrl.origin !== window.location.origin) {
              return false;
            }

            return (
              FIRST_PARTY_PATH_PATTERN.test(sourceUrl.pathname) ||
              sourceUrl.pathname === window.location.pathname ||
              sourceUrl.pathname.startsWith("/assets/")
            );
          } catch {
            return false;
          }
        };

        const stackHasFirstPartySource = (stack) =>
          String(stack || "")
            .split("\n")
            .some((line) => {
              const urlMatch = line.match(/https?:\/\/[^\s)]+/i);
              if (urlMatch) {
                return isFirstPartySource(urlMatch[0]);
              }
              return FIRST_PARTY_PATH_PATTERN.test(line);
            });

        const hasFirstPartyEvidence = (normalized) =>
          isFirstPartySource(normalized.source) ||
          stackHasFirstPartySource(normalized.stack);

        const rememberConsoleError = (args) => {
          const summary = truncate(
            args.map((arg) => stringifyValue(arg)).join(" "),
          );
          if (!summary) {
            return;
          }
          recentConsoleErrors.push(summary);
          if (recentConsoleErrors.length > MAX_RECENT_CONSOLE_ERRORS) {
            recentConsoleErrors.shift();
          }
        };

        const getRecentDiagnostics = () => recentConsoleErrors.slice();

        const postToParent = (payload) => {
          if (!window.parent || window.parent === window) {
            return;
          }
          try {
            window.parent.postMessage(
              {
                [BRIDGE_FLAG]: true,
                href: window.location.href,
                timestamp: Date.now(),
                ...payload,
              },
              "*",
            );
          } catch {
            // Ignore bridge failures to avoid hiding the original runtime error.
          }
        };

        let viteOverlayReported = false;
        let blankPageReported = false;
        let consecutiveBlankChecks = 0;
        let healthCheckSequence = 0;

        const getViteOverlayText = (overlay) => {
          try {
            return truncate(
              String(
                overlay.shadowRoot?.textContent ||
                  overlay.textContent ||
                  "Vite error overlay is visible.",
              ).trim(),
            );
          } catch {
            return "Vite error overlay is visible.";
          }
        };

        const reportViteOverlay = () => {
          const overlay = document.querySelector("vite-error-overlay");
          if (!overlay || viteOverlayReported) {
            return Boolean(overlay);
          }

          viteOverlayReported = true;
          postToParent({
            type: "runtime-error",
            kind: "vite-overlay-error",
            name: "ViteError",
            message: getViteOverlayText(overlay),
            args: getRecentDiagnostics(),
          });
          return true;
        };

        const hasVisiblePageContent = () => {
          const root = document.querySelector("#root") || document.body;
          const nodes = [root, ...root.querySelectorAll("*")];

          return nodes.some((element) => {
            if (
              !(element instanceof HTMLElement) &&
              !(element instanceof SVGElement)
            ) {
              return false;
            }

            const tagName = element.tagName.toLowerCase();
            if (["script", "style", "link", "meta", "noscript"].includes(tagName)) {
              return false;
            }

            const style = window.getComputedStyle(element);
            const rect = element.getBoundingClientRect();
            if (
              style.display === "none" ||
              style.visibility === "hidden" ||
              Number(style.opacity) === 0 ||
              rect.width < 2 ||
              rect.height < 2
            ) {
              return false;
            }

            const isVisualElement = [
              "img",
              "svg",
              "canvas",
              "video",
              "iframe",
              "input",
              "button",
            ].includes(tagName);
            const hasText = String(element.textContent || "").trim().length > 0;
            const hasBackgroundImage = style.backgroundImage !== "none";
            return isVisualElement || hasText || hasBackgroundImage;
          });
        };

        const checkPageHealth = () => {
          if (reportViteOverlay()) {
            return;
          }

          if (hasVisiblePageContent()) {
            consecutiveBlankChecks = 0;
            return;
          }

          consecutiveBlankChecks += 1;
          if (consecutiveBlankChecks < 2 || blankPageReported) {
            return;
          }

          blankPageReported = true;
          postToParent({
            type: "runtime-error",
            kind: "blank-page",
            name: "BlankPageError",
            message: "The preview rendered no visible page content.",
            args: getRecentDiagnostics(),
          });
        };

        const schedulePageHealthChecks = (firstDelay = 1500, secondDelay = 3000) => {
          healthCheckSequence += 1;
          const sequence = healthCheckSequence;
          consecutiveBlankChecks = 0;
          blankPageReported = false;
          const runCurrentHealthCheck = () => {
            if (sequence === healthCheckSequence) {
              checkPageHealth();
            }
          };
          window.setTimeout(runCurrentHealthCheck, firstDelay);
          window.setTimeout(runCurrentHealthCheck, secondDelay);
        };

        if (document.readyState === "complete") {
          schedulePageHealthChecks();
        } else {
          window.addEventListener(
            "load",
            () => schedulePageHealthChecks(),
            { once: true },
          );
        }

        window.addEventListener("message", (event) => {
          if (
            event.source === window.parent &&
            event.data?.type === HEALTH_CHECK_COMMAND
          ) {
            schedulePageHealthChecks(100, 1600);
          }
        });

        const viteOverlayObserver = new MutationObserver((records) => {
          const overlayAdded = records.some((record) =>
            Array.from(record.addedNodes).some(
              (node) =>
                node instanceof Element &&
                (node.matches("vite-error-overlay") ||
                  Boolean(node.querySelector("vite-error-overlay"))),
            ),
          );
          if (overlayAdded && reportViteOverlay()) {
            viteOverlayObserver.disconnect();
          }
        });
        viteOverlayObserver.observe(document.documentElement, {
          childList: true,
          subtree: true,
        });

        window.addEventListener(
          "error",
          (event) => {
            const target = event.target;
            const isResourceError =
              target && target !== window && target !== document;

            if (isResourceError) {
              const tagName = target.tagName || "resource";
              const resourceUrl =
                target.currentSrc || target.src || target.href || "";
              const normalizedTagName = tagName.toLowerCase();
              const isCriticalResource =
                normalizedTagName === "script" ||
                (normalizedTagName === "link" &&
                  target.rel === "stylesheet" &&
                  /\.css(?:$|[?#])/i.test(resourceUrl));

              if (isCriticalResource && isFirstPartySource(resourceUrl)) {
                postToParent({
                  type: "runtime-error",
                  kind: "resource-error",
                  message: `Failed to load ${normalizedTagName} resource.`,
                  source: resourceUrl,
                  resourceTagName: normalizedTagName,
                  resourceUrl,
                  args: getRecentDiagnostics(),
                });
              }
              return;
            }

            const normalized = normalizeErrorLike(event.error || event.message);
            const source = event.filename || normalized.source;
            if (
              !isFirstPartySource(source) &&
              !stackHasFirstPartySource(normalized.stack)
            ) {
              return;
            }
            postToParent({
              type: "runtime-error",
              kind: "error",
              name: normalized.name,
              message: normalized.message || event.message,
              stack: normalized.stack,
              source,
              lineno: event.lineno || normalized.lineno,
              colno: event.colno || normalized.colno,
              args: getRecentDiagnostics(),
            });
          },
          true,
        );

        window.addEventListener("unhandledrejection", (event) => {
          const normalized = normalizeErrorLike(event.reason);
          const combinedMessage = `${normalized.name} ${normalized.message}`;
          if (
            IGNORED_PROMISE_PATTERN.test(combinedMessage) ||
            !hasFirstPartyEvidence(normalized)
          ) {
            return;
          }
          postToParent({
            type: "unhandled-rejection",
            kind: "promise-rejection",
            name: normalized.name,
            message: normalized.message || "Unhandled promise rejection",
            stack: normalized.stack,
            source: normalized.source,
            lineno: normalized.lineno,
            colno: normalized.colno,
            reason: stringifyValue(event.reason),
            args: getRecentDiagnostics(),
          });
        });

        const originalConsoleError = console.error.bind(console);
        console.error = (...args) => {
          rememberConsoleError(args);
          originalConsoleError(...args);
        };
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
