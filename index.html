  <body>
    <div id="root"></div>
    <script>
      (() => {
        if (window.__STRK_PREVIEW_ROUTE_BRIDGE__) return;
        window.__STRK_PREVIEW_ROUTE_BRIDGE__ = true;
        const CHANNEL = "strikingly-preview";
        const VERSION = 1;
        const getRoutePayload = (source) => ({
          url: window.location.href,
          origin: window.location.origin,
          path: window.location.pathname + window.location.search + window.location.hash,
          pathname: window.location.pathname,
          search: window.location.search,
          hash: window.location.hash,
          title: document.title,
          source,
          timestamp: Date.now(),
        });
        const postRoute = (type, source) => {
          if (!window.parent || window.parent === window) return;
          try {
            window.parent.postMessage({ channel: CHANNEL, version: VERSION, type, payload: getRoutePayload(source) }, "*");
          } catch (e) {}
        };
        const notify = (source) => window.requestAnimationFrame(() => postRoute("route:changed", source));
        const patch = (m) => {
          const orig = window.history[m];
          if (typeof orig !== "function") return;
          window.history[m] = function (...args) { const r = orig.apply(this, args); notify(m); return r; };
        };
        patch("pushState"); patch("replaceState");
        window.addEventListener("popstate", () => notify("popstate"));
        window.addEventListener("hashchange", () => notify("hashchange"));
        notify("initial");
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
