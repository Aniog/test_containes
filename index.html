<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      #hero-title { color: #fff !important; text-shadow: 0 6px 28px rgba(0, 0, 0, 0.76) !important; }
      #hero-subhead { color: rgba(255, 255, 255, 0.96) !important; text-shadow: 0 3px 18px rgba(0, 0, 0, 0.8) !important; }
      #hero-eyebrow,
      main section:first-child .animate-fade-up > p:first-child {
        color: #fff7d6 !important;
        text-shadow: 0 3px 18px rgba(0, 0, 0, 0.9) !important;
        background: rgba(0, 0, 0, 0.38) !important;
        display: inline-block !important;
        padding: .45rem .75rem !important;
      }
      .hero-contrast-overlay { background: linear-gradient(90deg, rgba(0,0,0,.94), rgba(0,0,0,.72), rgba(0,0,0,.32)) !important; }
      .hero-cta,
      main section:first-child .animate-fade-up > a {
        color: #241A16 !important;
        background-color: #D8B982 !important;
        border: 1px solid rgba(255,255,255,.55) !important;
        box-shadow: 0 18px 50px rgba(0,0,0,.28) !important;
      }
      header.text-white,
      header.text-white a,
      header.text-white button {
        color: #fff !important;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.84) !important;
      }
    </style>
    <title>Velmora Fine Jewelry</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        if (window.__STRK_PREVIEW_ROUTE_BRIDGE__) {
          return;
        }

        window.__STRK_PREVIEW_ROUTE_BRIDGE__ = true;

        const CHANNEL = "strikingly-preview";
        const VERSION = 1;

        const getRoutePayload = (source) => ({
          url: window.location.href,
          origin: window.location.origin,
          path: `${window.location.pathname}${window.location.search}${window.location.hash}`,
          pathname: window.location.pathname,
          search: window.location.search,
          hash: window.location.hash,
          title: document.title,
          source,
          timestamp: Date.now(),
        });

        const postRoute = (type, source) => {
          if (!window.parent || window.parent === window) {
            return;
          }

          try {
            window.parent.postMessage(
              {
                channel: CHANNEL,
                version: VERSION,
                type,
                payload: getRoutePayload(source),
              },
              "*",
            );
          } catch {
            // Keep the generated app running even if preview communication fails.
          }
        };

        const notifyRouteChanged = (source) => {
          window.requestAnimationFrame(() =>
            postRoute("route:changed", source),
          );
        };

        const patchHistoryMethod = (methodName) => {
          const originalMethod = window.history[methodName];
          if (typeof originalMethod !== "function") {
            return;
          }

          window.history[methodName] = function patchedHistoryMethod(...args) {
            const result = originalMethod.apply(this, args);
            notifyRouteChanged(methodName);
            return result;
          };
        };

        patchHistoryMethod("pushState");
        patchHistoryMethod("replaceState");

        window.addEventListener("popstate", () => {
          notifyRouteChanged("popstate");
        });

        window.addEventListener("hashchange", () => {
          notifyRouteChanged("hashchange");
        });

        window.addEventListener("load", () => {
          postRoute("route:ready", "load");
          postRoute("route:changed", "load");
        });

        window.addEventListener("message", (event) => {
          const data = event.data;
          if (
            !data ||
            typeof data !== "object" ||
            data.channel !== CHANNEL ||
            data.version !== VERSION
          ) {
            return;
          }

          if (data.type === "route:request") {
            postRoute("route:changed", "load");
            return;
          }

          if (data.type !== "route:navigate") {
            return;
          }

          const path = data.payload?.path;
          if (typeof path !== "string" || !path) {
            return;
          }

          const replace = Boolean(data.payload?.replace);
          const navigate = window.__STRIKINGLY_PREVIEW_NAVIGATE__;

          if (typeof navigate === "function") {
            navigate(path, { replace });
            notifyRouteChanged("navigate-command");
            return;
          }

          if (replace) {
            window.history.replaceState({}, "", path);
          } else {
            window.history.pushState({}, "", path);
          }

          window.dispatchEvent(new PopStateEvent("popstate", { state: {} }));
          notifyRouteChanged("navigate-command");
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
