<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <title>Velmora Fine Jewelry</title>
    <script>
      // Global error handler to display errors
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:20px;z-index:9999;font-family:monospace;';
        errorDiv.innerHTML = '<h3>JavaScript Error:</h3><p>' + msg + '</p><p>Line: ' + lineNo + ', Column: ' + columnNo + '</p>';
        document.body.appendChild(errorDiv);
        return false;
      };
      
      // Catch promise rejections
      window.addEventListener('unhandledrejection', function(e) {
        var errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:20px;z-index:9999;font-family:monospace;';
        errorDiv.innerHTML = '<h3>Promise Rejection:</h3><p>' + e.reason + '</p>';
        document.body.appendChild(errorDiv);
      });
      
      console.log('HTML: Script tags loaded');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Immediate test
      document.getElementById('root').innerHTML = '<div style="padding: 40px; font-family: sans-serif;"><h1>Loading Velmora...</h1><p>If this text stays, React is not loading.</p></div>';
      console.log('HTML: Root element updated');
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
