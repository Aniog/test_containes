<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FAF6F1" />
    <meta
      name="description"
      content="Velmora Fine Jewelry — demi-fine gold jewelry crafted to be treasured. Earrings, necklaces and huggies, 18K gold plated and hypoallergenic."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Velmora — Crafted to be Treasured</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Expose a navigation hook the preview bridge can call to drive the
      // client-side router without doing a full page reload.
      window.__STRIKINGLY_PREVIEW_NAVIGATE__ = (path, options) => {
        window.dispatchEvent(
          new CustomEvent("strikingly-preview-navigate", {
            detail: { path, options: options || {} },
          }),
        );
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
